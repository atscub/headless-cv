      Owned the back-office application used by employees across all teams.

      - Led a partial Flask → FastAPI migration, improving response times **4×** for the data-science team.
      - Designed the Portfolio Management system used by partner account managers (positions worth over **€100k+**).

      _Angular, TypeScript, Flask, FastAPI, MongoDB_
  - title: Senior Mobile Developer (Ionic), Fonoma
    locationIcon: Globe
    location: Remote
    period: Oct 2019 — Jan 2022
    description: |
      [https://www.fonoma.com/en](https://www.fonoma.com/en)

      Senior on the mobile team owning the app used by Fonoma’s customers (**20k+ top-ups/week**).

      - Contributed to the full redesign and performance work for the app, and untangled a legacy codebase by enforcing proper typing and migrating from promise-heavy flows to async/await.

      _Ionic, Angular, TypeScript_
  - title: Founder & Full Stack Developer, Aurora Suite
    locationIcon: MapPin
    location: Havana, Cuba
    period: Mar 2012 — May 2019
    extraSpacing: true
    description: |
      [https://aurorasuite.io](https://aurorasuite.io)

      Solo founder of a mail-to-web bridge that let people in Cuba navigate the internet over email. [Freedom House](https://freedomhouse.org/) cited it as one of the tools used to bypass government censorship.

      - Built a Browser → Client App → Email↔Web Bridge → Web architecture serving **5k+ paying customers**, **USD 12k MRR**, **100k+ emails/day**, with custom Java (Android) and .NET (Windows) clients doing low-level concurrency to multiplex many simultaneous HTTP requests over a single SMTP/IMAP channel — **~4-second round trips**, faster than any other web-to-email solution at the time.

      _JavaScript, Android (Java), .NET (C#), PHP, Postfix, MySQL_
openSource:
  - name: Godel
    meta: "Python · agent orchestrator"
    description: |
      An open-source Python orchestration framework. Gives general purpose agents like Codex, Claude or Pi a deterministic meta harness for reliable and repeatable execution of complex workflows, makes the deterministic/non deterministic boundary explicit. Decorator-based `@workflow` / `@step`, structured event logs, pause/resume/rewind on typed Pydantic v2 state. Auditable, durable, self-healing.
  - name: nautapy
    stars: "41 stars"
    meta: "Python library · github.com/atscub/nautapy"
    description: |
      A Python client for Cuba’s Nauta internet service — checking balance, viewing usage history, handling connections programmatically. Abstracts away the Nauta portal’s authentication and session management.
  - name: know-your-limits
    meta: "Claude Code plugin · [github.com/atscub/know-your-limits](https://github.com/atscub/know-your-limits)"
    description: |
      A Claude Code plugin with 7 metacognition skills — /socratic, /premortem, /reframe, /decompose, /coherence, /reflect, and /learn — for agent to self monitor and regulate their thought process, reducing their biasses and known problems like confirmation bias, anchoring, sycophancy, Dunning-Kruger effect, and hallucinations. Improvements are more dramatic in the smaller models. Backed by research and benchmarks.
