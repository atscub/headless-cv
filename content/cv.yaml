profile: |
  Senior software engineer with 14 years across frontend, full-stack, mobile, and distributed systems. Started in Cuba building an email-to-web bridge during the early-internet years. Built and maintain an open source cli tool used by many Cubans today to manage their internet access. Applied AI, beyond the hype, is a new found passion.
experience:
  - title: Senior Software Engineer, Transferz
    locationIcon: MapPin
    location: Amsterdam, NL
    period: Sep 2023 — Present
    description: |
      [https://transferz.com](https://transferz.com/)

      Own the whitelabel portal (**50k+ weekly users**), partner portal, traveler app, and several GraphQL-based BFFs serving **600k+ daily queries**.

      - Led the creation of an admin portal for one of our B2B partners, one of the largest European travel groups; and an embeddable vehicle-selection widget (Vite + React + TailwindCSS + TanStack).
      - Redesigned the whitelabel app and ran reactive A/B tests, lifting conversion **~50%** and enabling rollout for **Agoda** (**~5k bookings/month**); built a GraphQL-prefetching layer that cut legacy load times **~50%**.
      - Introduced GraphQL schema-based type generation, reducing production bugs **~80%** (measured in our Datadog environment); raised test coverage to **80%+** with AI-augmented practices.

      _React, Vite, TypeScript, GraphQL, Node.js_
  - title: Senior Full Stack Engineer and Team Lead, BOTS
    locationIcon: MapPin
